<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="logo">🏛️</span>
      <span>GT Admin</span>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/admin/places" routerLinkActive="active">
        <span class="nav-icon">📍</span> Manage Places
      </a>
      <a routerLink="/" class="external-link">
        <span class="nav-icon">🌐</span> View Site
      </a>
    </nav>
    <div class="sidebar-footer">
      <span class="username">{{ authService.getUsername() }}</span>
      <button (click)="logout()">Logout</button>
    </div>
  </aside>

  <main class="admin-main">
    <router-outlet />
  </main>
</div>
