<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="logo">🏛️</span>
      <h1>Gujarat Tourism</h1>
      <p>Admin Portal</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      @if (errorMessage) {
        <div class="error-alert">{{ errorMessage }}</div>
      }

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" placeholder="Enter username" autocomplete="username" />
        @if (form.get('username')?.invalid && form.get('username')?.touched) {
          <span class="field-error">Username is required</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Enter password" autocomplete="current-password" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="field-error">Password must be at least 6 characters</span>
        }
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading">
        @if (loading) { Signing in... } @else { Sign In }
      </button>
    </form>
  </div>
</div>
